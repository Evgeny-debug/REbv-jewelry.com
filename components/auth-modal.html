<div id="authModal" class="fixed inset-0 bg-black/80 z-[6000] hidden opacity-0 transition-opacity flex items-center justify-center p-4 backdrop-blur-sm" aria-modal="true" role="dialog">
    
    <div class="glass-panel p-6 md:p-8 w-full max-w-sm relative rounded-xl shadow-2xl bg-[var(--bg-card)] border border-[var(--border)] flex flex-col justify-center">
        <button onclick="window.closeAuthModal()" class="absolute top-4 right-4 text-[var(--text-muted)] hover:text-[var(--danger)] text-2xl leading-none transition-colors" aria-label="Закрити">×</button>
        
        <div id="authFormContainer" class="w-full">
            <h3 id="authTitle" class="text-2xl font-serif text-[var(--text-main)] mb-1 text-center" data-i18n="login">Вхід</h3>
            <p id="authSubtitle" class="text-center text-[var(--text-muted)] text-xs mb-5 font-light">Раді бачити вас знову</p>
            
            <form id="authForm" class="flex flex-col gap-3">
                <div id="nameFieldContainer" class="hidden flex-col gap-1">
                    <label class="text-[9px] uppercase tracking-[0.2em] font-bold text-[var(--gold-muted)] ml-1">Ваше ім'я</label>
                    <input type="text" id="authName" placeholder="Олена" class="auth-input rounded-md py-2.5 px-3 text-sm">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[9px] uppercase tracking-[0.2em] font-bold text-[var(--gold-muted)] ml-1">Email</label>
                    <input type="email" id="authUser" placeholder="mail@example.com" class="auth-input rounded-md py-2.5 px-3 text-sm" required>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[9px] uppercase tracking-[0.2em] font-bold text-[var(--gold-muted)] ml-1">Пароль</label>
                    <input type="password" id="authPass" placeholder="Мінімум 6 символів" class="auth-input rounded-md py-2.5 px-3 text-sm" required>
                </div>
                
                <button type="submit" class="mt-2 w-full bg-[var(--text-main)] text-[var(--bg-body)] py-3 rounded-md font-bold uppercase tracking-widest text-[10px] hover:bg-[var(--gold-muted)] hover:text-[#111] transition-colors active:scale-95 shadow-md border border-[var(--text-main)] hover:border-[var(--gold-muted)]" id="authSubmitBtn" data-i18n="login">Увійти</button>
                
                <div class="mt-3 flex items-center justify-center gap-3">
                    <div class="h-[1px] bg-[var(--border)] flex-grow"></div>
                    <span class="text-[9px] uppercase tracking-widest text-[var(--text-muted)]">Або</span>
                    <div class="h-[1px] bg-[var(--border)] flex-grow"></div>
                </div>

                <div class="flex gap-3 mt-1">
                    <button type="button" onclick="window.loginWithGoogle()" class="flex-1 flex items-center justify-center gap-2 py-2 border border-[var(--border)] hover:border-[var(--gold-muted)] transition-colors rounded-md bg-[rgba(255,255,255,0.02)] hover:bg-[rgba(255,255,255,0.05)]">
                        <svg width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-[var(--text-main)]">Google</span>
                    </button>
                    <button type="button" onclick="window.loginWithApple()" class="flex-1 flex items-center justify-center gap-2 py-2 border border-[var(--border)] hover:border-[var(--gold-muted)] transition-colors rounded-md bg-[rgba(255,255,255,0.02)] hover:bg-[rgba(255,255,255,0.05)]">
                        <svg width="16" height="16" viewBox="0 0 384 448" xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="text-[var(--text-main)]"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-[var(--text-main)]">Apple</span>
                    </button>
                </div>

                <div class="text-center text-xs text-[var(--text-muted)] mt-3">
                    <span id="authToggleText">Немає акаунта?</span>
                    <button type="button" onclick="window.toggleAuthMode && window.toggleAuthMode(event)" class="text-[var(--gold-muted)] font-bold hover:underline ml-1" id="authToggleLink" data-i18n="register">Зареєструватися</button>
                </div>
            </form>
        </div>

        <div id="profileView" class="hidden flex-col gap-3 w-full">
            <h3 class="text-2xl font-serif text-[var(--text-main)] mb-1 text-center" data-i18n="login_mob_title">Кабінет</h3>
            <div class="flex flex-col items-center justify-center p-5 bg-[rgba(255,255,255,0.02)] border border-[var(--border)] rounded-xl mb-2">
                <div class="w-14 h-14 bg-[var(--gold-muted)] text-[#111] rounded-full flex items-center justify-center text-xl font-bold uppercase shadow-lg mb-3" id="profAvatar">A</div>
                <p class="text-center text-[var(--text-main)] font-medium text-base" id="profName">User</p>
                <p class="text-center text-[var(--text-muted)] text-xs mt-1" id="profEmail">user@mail.com</p>
            </div>
            <button onclick="location.href='admin.html'" id="adminLinkBtn" class="hidden w-full bg-[var(--gold-muted)] text-[#111] py-3 rounded-md font-bold uppercase tracking-widest text-[10px] hover:opacity-90 transition-opacity active:scale-95 shadow-md">Увійти в Адмінку</button>
            <button onclick="location.href='profile.html'" id="clientLinkBtn" class="hidden w-full border border-[var(--gold-muted)] text-[var(--gold-muted)] py-3 rounded-md font-bold uppercase tracking-widest text-[10px] hover:bg-[var(--gold-muted)] hover:text-[#111] transition-colors active:scale-95">Мої замовлення</button>
            <button onclick="window.logoutUser()" class="w-full py-3 rounded-md border border-[var(--danger)] text-[var(--danger)] hover:bg-[var(--danger)] hover:text-white transition-colors uppercase tracking-widest text-[10px] font-bold active:scale-95 mt-1">Вийти з акаунта</button>
        </div>
    </div>
</div>
