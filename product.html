<!DOCTYPE html>
<html lang="uk" data-theme="light" style="scroll-behavior: smooth;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">
    
    <script>
        (function initThemeBeforePaint() {
            try {
                const savedTheme = JSON.parse(localStorage.getItem('bv_theme'));
                const theme = savedTheme === 'dark' || savedTheme === 'light' ? savedTheme : 'light';
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>

    <title>Товар | BV Jewelry</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">

    <style>
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Вирівнювання галереї */
        .product-gallery-main {
            aspect-ratio: 1 / 1;
            background-color: #ffffff;
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
        }
        [data-theme="dark"] .product-gallery-main { background-color: #121212; }
    </style>
</head>
<body class="mobile-padding antialiased selection:bg-[#c5a059] selection:text-white pb-[60px] md:pb-0">

    <div id="auth-modal-placeholder"></div>
    <div id="cart-sidebar-placeholder"></div>
    <div id="header-placeholder"></div>

    <main class="pt-28 md:pt-36 pb-20 w-full max-w-[1320px] mx-auto px-4 md:px-8 min-h-screen">
        <div id="productContainer">
            
            <nav class="flex items-center gap-2 text-[10px] uppercase tracking-[0.2em] font-bold text-[var(--text-muted)] mb-8">
                <a href="index.html" class="hover:text-[var(--gold-muted)] transition-colors" data-i18n="m1">Головна</a>
                <span class="opacity-30">/</span>
                <a href="catalog.html" class="hover:text-[var(--gold-muted)] transition-colors" data-i18n="m2">Каталог</a>
                <span class="opacity-30">/</span>
                <a href="#" id="bcCategory" class="text-[var(--gold-muted)]">...</a>
            </nav>

            <div class="flex flex-col lg:flex-row gap-10 lg:gap-16">
                <div class="w-full lg:w-1/2 flex flex-col gap-4">
                    <div class="product-gallery-main relative overflow-hidden group">
                        <img id="mainGalleryImg" src="" alt="Product Image" class="w-full h-full object-contain p-4 mix-blend-multiply dark:mix-blend-normal transition-transform duration-700 group-hover:scale-110">
                    </div>
                    <div id="galleryThumbs" class="flex gap-4 overflow-x-auto custom-scrollbar pb-2 snap-x hidden"></div>
                </div>

                <div class="w-full lg:w-1/2 flex flex-col justify-start pt-2 lg:pt-8">
                    <div class="flex items-center justify-between mb-2">
                        <span id="prodSku" class="text-[10px] uppercase tracking-[0.2em] font-bold text-[var(--text-muted)]">SKU</span>
                        <span id="prodStatus" class="text-[10px] uppercase font-bold tracking-widest">Статус</span>
                    </div>
                    
                    <h1 id="prodTitle" class="font-serif text-3xl md:text-5xl text-[var(--text-main)] mb-6 leading-tight">Завантаження...</h1>
                    
                    <div class="flex items-end gap-4 mb-8 pb-8 border-b border-[var(--border)]">
                        <span id="prodPrice" class="text-3xl font-bold text-[var(--text-main)]">0 ₴</span>
                        <span id="prodOldPrice" class="text-lg text-[var(--text-muted)] line-through mb-1 hidden">0 ₴</span>
                    </div>

                    <div id="variantsWrapper" class="mb-8">
                        <span class="text-[10px] uppercase tracking-[0.2em] font-bold text-[var(--gold-muted)] block mb-4" data-i18n="menu_metal">Матеріал</span>
                        <div id="variantsContainer" class="flex flex-wrap gap-3"></div>
                    </div>

                    <div id="sizesWrapper" class="mb-10">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[10px] uppercase tracking-[0.2em] font-bold text-[var(--gold-muted)] block">Оберіть розмір</span>
                        </div>
                        <div id="sizesContainer" class="flex flex-wrap gap-2"></div>
                    </div>

                    <div class="flex items-center gap-4 mt-auto">
                        <button id="mainBuyBtn" onclick="handleMainBuyClick()" class="flex-grow bg-[var(--text-main)] text-[var(--bg-body)] py-4 px-6 rounded-xl font-bold uppercase tracking-widest text-[11px] hover:bg-[var(--gold-muted)] transition-colors active:scale-95 shadow-lg flex items-center justify-center gap-2">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                            <span data-i18n="btn_buy">У кошик</span>
                        </button>
                        <button id="prodFavBtn" onclick="handleMainFavClick()" class="w-14 h-14 border border-[var(--border)] rounded-xl flex items-center justify-center text-[var(--text-main)] hover:border-[var(--gold-muted)] hover:text-[var(--gold-muted)] transition-colors active:scale-95">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                        </button>
                    </div>

                    <div class="mt-12">
                        <div class="flex gap-6 border-b border-[var(--border)] mb-6">
                            <button class="tab-btn text-[11px] uppercase tracking-widest font-bold pb-3 border-b-2 border-[var(--gold-muted)] text-[var(--gold-muted)] transition-colors" onclick="switchTab('tabDesc')" data-i18n="desc_title">Опис</button>
                            <button class="tab-btn text-[11px] uppercase tracking-widest font-bold pb-3 border-b-2 border-transparent text-[var(--text-muted)] hover:text-[var(--text-main)] transition-colors" onclick="switchTab('tabSpecs')" data-i18n="pd_nav_specs">Характеристики</button>
                        </div>
                        <div id="tabDesc" class="tab-content text-[14px] text-[var(--text-muted)] font-light leading-relaxed">
                            <div id="prodDesc"></div>
                        </div>
                        <div id="tabSpecs" class="tab-content hidden text-[14px] text-[var(--text-muted)] font-light leading-relaxed">
                            <ul class="space-y-3">
                                <li class="flex justify-between border-b border-[var(--border)] pb-2"><span>Бренд:</span> <strong class="text-[var(--text-main)] font-medium">BV Jewelry</strong></li>
                                <li class="flex justify-between border-b border-[var(--border)] pb-2"><span>Країна:</span> <strong class="text-[var(--text-main)] font-medium">Україна</strong></li>
                                <li class="flex justify-between border-b border-[var(--border)] pb-2"><span>Упаковка:</span> <strong class="text-[var(--text-main)] font-medium">Фірмова коробка</strong></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <div class="w-full bg-[var(--bg-card)] border-t border-[var(--border)] py-16">
        <div class="max-w-[1320px] mx-auto px-4 md:px-8">
            <section id="similarSection" class="hidden mb-16">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="font-serif text-2xl md:text-3xl text-[var(--text-main)]" data-i18n="similar">Схожі вироби</h2>
                </div>
                <div class="promo-carousel-container select-none group relative !pt-0 !mt-0 !mb-0 !pb-0">
                    <div id="similarGrid" class="flex overflow-x-auto gap-0 snap-x snap-mandatory no-scrollbar pb-4 min-h-[300px]"></div>
                </div>
            </section>

            <section id="boughtTogetherSection" class="hidden">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="font-serif text-2xl md:text-3xl text-[var(--text-main)]">З цим купують</h2>
                </div>
                <div class="promo-carousel-container select-none group relative !pt-0 !mt-0 !mb-0 !pb-0">
                    <div id="boughtTogetherGrid" class="flex overflow-x-auto gap-0 snap-x snap-mandatory no-scrollbar pb-4 min-h-[300px]"></div>
                </div>
            </section>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <button id="scrollToTopBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="fixed bottom-24 right-6 w-12 h-12 bg-[var(--gold-muted)] text-[#111] rounded-full flex items-center justify-center opacity-0 pointer-events-none translate-y-4 transition-all duration-300 z-[4900] shadow-[0_8px_30px_rgba(0,0,0,0.15)]">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </button>

    <script src="js/demo-data.js"></script>
    <script src="js/core/api.js"></script>
    <script src="js/core/ui.js"></script>
    <script src="js/core/init.js"></script>
    <script src="js/pages/product.js"></script>

</body>
</html>
