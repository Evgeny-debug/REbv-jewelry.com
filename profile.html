<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">
    
    <script>
        (function initThemeBeforePaint() {
            try {
                const savedTheme = JSON.parse(localStorage.getItem('bv_theme'));
                const theme = savedTheme === 'dark' || savedTheme === 'light' ? savedTheme : 'light';
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
        })();
    </script>

    <title>Особистий кабінет | BV Jewelry</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=Montserrat:wght@200;300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="mobile-padding antialiased selection:bg-[#c5a059] selection:text-white pb-20 md:pb-0">

    <div id="auth-modal-placeholder"></div>
    <div id="cart-sidebar-placeholder"></div>
    <div id="header-placeholder"></div>

    <main class="pt-32 pb-20 px-4 md:px-6 max-w-6xl mx-auto min-h-screen">
        
        <div class="mb-12 text-center md:text-left animate-fade-in">
            <h1 class="font-serif text-4xl md:text-5xl italic text-[var(--gold-muted)]">Мій кабінет</h1>
            <p class="text-[var(--text-muted)] text-[14px] mt-2 font-light">Вітаємо у вашому персональному просторі BV Jewelry</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8 items-start">
            
            <aside class="lg:col-span-1 flex flex-col gap-6">
                <div class="glass-panel p-8 rounded-[32px] text-center bg-[var(--bg-card)] border border-[var(--border)] shadow-xl relative overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-br from-[var(--gold-muted)]/10 to-transparent opacity-50"></div>
                    <div id="profileAvatar" class="relative w-24 h-24 bg-[var(--gold-muted)] text-[#111] rounded-full flex items-center justify-center text-3xl font-bold uppercase mx-auto mb-6 shadow-[0_0_20px_rgba(197,160,89,0.4)] z-10">?</div>
                    <h2 id="userNameDisplay" class="relative text-xl font-semibold text-[var(--text-main)] z-10">Завантаження...</h2>
                    <p id="userEmailDisplay" class="relative text-[13px] text-[var(--text-muted)] mt-1 font-light italic z-10">...</p>
                    
                    <div class="relative mt-8 pt-8 border-t border-[var(--border)] flex flex-col gap-3 z-10">
                        <div id="adminBadge" class="hidden px-4 py-2 bg-[var(--gold-muted)]/10 text-[var(--gold-muted)] rounded-xl text-[10px] uppercase font-bold tracking-widest mb-2 border border-[var(--gold-muted)]/20">Адміністратор</div>
                        <a href="admin.html" id="adminLink" class="hidden w-full py-4 rounded-xl border border-[var(--gold-muted)] text-[var(--gold-muted)] hover:bg-[var(--gold-muted)] hover:text-[#111] transition-all uppercase tracking-widest text-[11px] font-bold active:scale-95 text-center flex justify-center items-center">Панель Адміна</a>
                        <button onclick="window.logoutUser()" class="btn-cross w-full py-4 rounded-xl border border-[var(--danger)] text-[var(--danger)] hover:bg-[var(--danger)] hover:text-white transition-all uppercase tracking-widest text-[11px] font-bold active:scale-95 bg-transparent">
                            Вийти з акаунта
                        </button>
                    </div>
                </div>
            </aside>

            <section class="lg:col-span-3 flex flex-col gap-8">
                
                <div class="flex gap-8 border-b border-[var(--border)] pb-2 overflow-x-auto no-scrollbar">
                    <button onclick="switchProfileTab('orders')" id="tab-orders" class="btn-cross profile-tab active text-[11px] uppercase tracking-[0.2em] font-bold text-[var(--gold-muted)] border-b-2 border-[var(--gold-muted)] pb-3 whitespace-nowrap transition-all bg-transparent rounded-none">
                        Історія замовлень
                    </button>
                    <button onclick="switchProfileTab('settings')" id="tab-settings" class="btn-cross profile-tab text-[11px] uppercase tracking-[0.2em] font-bold text-[var(--text-muted)] hover:text-[var(--text-main)] pb-3 whitespace-nowrap transition-all bg-transparent rounded-none">
                        Налаштування
                    </button>
                </div>

                <div id="content-orders" class="tab-content flex flex-col gap-4">
                    <div id="ordersList" class="flex flex-col gap-4">
                        </div>
                </div>

                <div id="content-settings" class="tab-content hidden flex flex-col gap-6 animate-fade-in">
                    <div class="glass-panel p-8 rounded-[32px] bg-[var(--bg-card)] border border-[var(--border)] shadow-xl">
                        <h3 class="text-xl font-serif text-[var(--text-main)] mb-6">Персональні дані</h3>
                        <form id="settingsForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="flex flex-col gap-2">
                                <label class="text-[10px] uppercase tracking-widest font-bold text-[var(--gold-muted)] ml-2">Повне ім'я</label>
                                <input type="text" id="settingName" placeholder="Введіть ім'я" class="auth-input outline-none border border-[var(--border)] bg-[rgba(255,255,255,0.03)] focus:border-[var(--gold-muted)] rounded-xl px-4 py-3 text-sm text-[var(--text-main)] transition-colors w-full">
                            </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-[10px] uppercase tracking-widest font-bold text-[var(--gold-muted)] ml-2">Email (тільки читання)</label>
                                <input type="email" id="settingEmail" class="auth-input outline-none border border-[var(--border)] bg-[rgba(255,255,255,0.03)] rounded-xl px-4 py-3 text-sm text-[var(--text-muted)] opacity-50 cursor-not-allowed w-full" readonly>
                            </div>
                            <div class="md:col-span-2 mt-4">
                                <button type="submit" class="btn-solid px-10 py-4 rounded-xl font-bold uppercase tracking-widest text-[11px] hover:bg-[var(--gold-muted)] hover:text-[#111] transition-all active:scale-95 shadow-lg w-full sm:w-auto">
                                    Зберегти зміни
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/demo-data.js"></script>
    <script src="js/core/api.js"></script>
    <script src="js/core/ui.js"></script>
    <script src="js/core/init.js"></script>
    <script src="js/pages/profile.js"></script>

</body>
</html>
